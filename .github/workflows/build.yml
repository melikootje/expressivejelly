name: build

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore /home/runner/work/expressivejelly/expressivejelly/ExpressiveJelly.sln

      - name: Build (Release)
        run: dotnet build /home/runner/work/expressivejelly/expressivejelly/ExpressiveJelly.sln -c Release --no-restore

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.ExpressiveJelly.dll
          path: Jellyfin.Plugin.ExpressiveJelly/bin/Release/net9.0/Jellyfin.Plugin.ExpressiveJelly.dll

      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.ExpressiveJelly/bin/Release/net9.0/Jellyfin.Plugin.ExpressiveJelly.dll

